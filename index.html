<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rh1so // Белый мышьяк</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card: #0e0e11;
            --accent: #00ffa3;
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #f0f0f0;
            --text-dim: #71717a;
            --radius-card: 32px;
            --radius-ui: 16px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-main); min-height: 100vh; line-height: 1.6; }

        /* NAVIGATION */
        nav {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(17, 17, 19, 0.7); backdrop-filter: blur(25px);
            padding: 8px; border-radius: 20px; border: 1px solid var(--border);
            display: flex; gap: 5px; z-index: 1000;
        }

        .nav-btn {
            padding: 12px 28px; border-radius: 14px; border: none;
            background: transparent; color: var(--text-dim);
            font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active { background: var(--accent); color: #000; }

        .page { display: none; padding: 140px 20px 80px; max-width: 1000px; margin: 0 auto; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* BENTO (Твой оригинал) */
        .bento-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .bento-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 40px; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .hero-card { grid-column: span 2; background: radial-gradient(circle at top right, #16161a, #0e0e11); }
        .hero-card h1 { font-size: 4rem; letter-spacing: -4px; font-weight: 800; line-height: 1; }
        .hero-card h1 span { color: var(--accent); }

        /* FORUM */
        #forum-feed { display: grid; gap: 20px; }
        .post-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 40px; cursor: pointer; transition: 0.3s; }
        .post-card:hover { border-color: var(--accent); }
        .post-meta { font-size: 11px; color: var(--accent); font-family: var(--font-mono); font-weight: 800; }

        /* TERMINAL */
        .term-container { background: #000; border: 1px solid var(--border); border-radius: 20px; padding: 25px; font-family: var(--font-mono); min-height: 450px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #term-output { flex-grow: 1; overflow-y: auto; color: var(--accent); font-size: 14px; white-space: pre-wrap; margin-bottom: 10px; }
        .term-line { display: flex; gap: 10px; align-items: center; }
        .term-input { background: transparent; border: none; color: #fff; font-family: var(--font-mono); font-size: 14px; outline: none; width: 100%; }
        .term-prompt { color: var(--accent); font-weight: bold; }

        /* MODAL */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; z-index: 2000; overflow-y: auto; padding: 100px 40px; }
        .close-btn { position: fixed; top: 30px; right: 30px; background: var(--card); padding: 12px 24px; border-radius: 12px; border: 1px solid var(--border); color: #888; cursor: pointer; z-index: 2001; }

        @media (max-width: 768px) { .bento-grid { grid-template-columns: 1fr; } .hero-card h1 { font-size: 2.8rem; } }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" onclick="switchTab('home', this)">Home</button>
    <button class="nav-btn" onclick="switchTab('forum', this)">Forum</button>
    <button class="nav-btn" onclick="switchTab('terminal', this)">Terminal</button>
    <button class="nav-btn" onclick="switchTab('secret', this)">Secret</button>
</nav>

<div id="home" class="page active">
    <div class="bento-grid">
        <div class="bento-card hero-card">
            <p style="color: var(--accent); font-weight: 800; font-size: 11px;">// SYSTEM_STATUS: ONLINE</p>
            <h1>FERUM<span>.OS</span></h1>
            <p style="color: var(--text-dim); max-width: 600px; font-size: 18px; margin-top: 10px;">Цифровой архитектор. Много текста, скругленные углы.</p>
        </div>
        <div class="bento-card"><h3>Skills</h3><p style="color: var(--text-dim); font-size: 13px; margin-top: 10px;">JS, C#, CSS, REACT(loading)</p></div>
        <div class="bento-card"><h3>Focus</h3><p style="color: var(--text-dim); font-size: 13px; margin-top: 10px;">Frontend & Creative Design</p></div>
    </div>
</div>

<div id="forum" class="page">
    <h2 style="font-size: 2.5rem; margin-bottom: 40px;">Local_Forum</h2>
    <div id="forum-feed"></div>
</div>

<div id="terminal" class="page">
    <h2 style="font-size: 2.5rem; margin-bottom: 40px;">System_Terminal</h2>
    <div class="term-container" onclick="document.getElementById('cli').focus()">
        <div id="term-output">Welcome to FERUM.OS v1.0.4
Type 'help' to see available commands.</div>
        <div class="term-line">
            <span class="term-prompt">user@ferum:~$</span>
            <input type="text" id="cli" class="term-input" autocomplete="off" autofocus spellcheck="false">
        </div>
    </div>
</div>

<div id="secret" class="page">
    <iframe id="rick-iframe" width="100%" height="450" src="" frameborder="0" style="border-radius:32px; border:1px solid var(--accent);"></iframe>
</div>

<div id="modal" onclick="this.style.display='none'; document.body.style.overflow='auto';">
    <div class="close-btn">[ ЗАКРЫТЬ ]</div>
    <div id="modal-content" class="modal-body" onclick="event.stopPropagation()" style="max-width:800px; margin:0 auto; color:#ccc;"></div>
</div>

<script>
    const SB_URL = 'https://ibybgkugoumvjftgxxii.supabase.co';
    const SB_KEY = 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F'; 
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let posts = [];

    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'secret') document.getElementById('rick-iframe').src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
        if(id === 'forum') loadForum();
    }

    async function loadForum() {
        const feed = document.getElementById('forum-feed');
        if (posts.length > 0) return;
        feed.innerHTML = 'LOADING...';
        const { data } = await sb.from('projects').select('*').order('id', { ascending: false });
        posts = data;
        feed.innerHTML = data.map((p, i) => `
            <div class="post-card" onclick="openP(${i})">
                <div class="post-meta">#${p.id} // DATA_NODE</div>
                <h3 style="font-size: 1.8rem; margin:10px 0;">${p.name}</h3>
                <p style="color:var(--text-dim)">${p.desc?.slice(0,100)}...</p>
            </div>
        `).join('');
    }

    function openP(i) {
        document.getElementById('modal-content').innerHTML = `<h1>${posts[i].name}</h1><p style="margin-top:30px; white-space:pre-wrap; line-height:1.8;">${posts[i].content || posts[i].desc}</p>`;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    // TERMINAL LOGIC
    const cli = document.getElementById('cli');
    const out = document.getElementById('term-output');

    cli.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = cli.value.toLowerCase().trim();
            print(`user@ferum:~$ ${cli.value}`, '#fff');
            
            if (cmd === 'help') {
                print("Available: status, about, posts, clear, help");
            } else if (cmd === 'status') {
                print("CPU: 12% | RAM: 450MB/16GB | DATABASE: CONNECTED\nOS_STATE: STABLE");
            } else if (cmd === 'about') {
                print("FERUM.OS - Personal Digital Environment by H1SO1.\nBuilt with Supabase & Pure Despair.");
            } else if (cmd === 'posts') {
                if(posts.length === 0) { print("Fetching database..."); await loadForum(); }
                posts.forEach(p => print(`> ${p.name}`));
            } else if (cmd === 'clear') {
                out.innerText = '';
            } else if (cmd !== '') {
                print(`Command '${cmd}' not found. Type 'help'.`, '#ff4757');
            }
            
            cli.value = '';
            out.scrollTop = out.scrollHeight;
        }
    });

    function print(txt, color = 'var(--accent)') {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerText = txt;
        out.appendChild(div);
    }
</script>
</body>
</html>
