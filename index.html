<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>H1SO1 // DIGITAL_VOID</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.6);
            --accent: #00ffa3;
            --text: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Анимированный фон (чтобы не было скучно) */
        body::before {
            content: "";
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, #111 0%, transparent 80%);
            z-index: -1;
        }

        .container { max-width: 900px; margin: 80px auto; padding: 0 20px; }

        header { margin-bottom: 60px; border-left: 4px solid var(--accent); padding-left: 20px; }
        h1 { font-size: 3rem; letter-spacing: -2px; font-weight: 800; color: #fff; }
        .status { color: var(--accent); font-family: monospace; font-size: 0.9rem; }

        /* Bento Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Circular Reveal для кнопок */
        .btn-reveal {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .btn-reveal::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; background: #fff;
            border-radius: 50%; transform: translate(-50%, -50%);
            transition: 0.5s ease; z-index: -1;
        }

        .btn-reveal:hover::after { width: 300px; height: 300px; }

        .links-area { grid-column: span 2; display: flex; flex-wrap: wrap; gap: 10px; }
        .link-tag {
            padding: 8px 16px; background: var(--glass);
            border-radius: 30px; color: var(--accent);
            text-decoration: none; border: 1px solid var(--accent);
            transition: 0.3s;
        }
        .link-tag:hover { background: var(--accent); color: #000; }

        #projects-loader { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        footer { margin-top: 100px; opacity: 0.3; font-size: 0.8rem; text-align: center; padding-bottom: 40px; }

        @media (max-width: 600px) {
            .grid, #projects-loader { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="status">CONNECTED_TO_SUPABASE // V8.0</div>
        <h1>FERUM.VOID</h1>
        <p>Content, Code & Pure IMHO. Пока ты это читаешь, я либо доделываю Вариант 7, либо объясняю Ярику, почему CS2 — это боль.</p>
    </header>

    <div class="grid">
        <div class="links-area">
            <a href="https://github.com/H1SO1" class="link-tag">GIT: H1SO1</a>
            <a href="https://t.me/rh1so" class="link-tag">TG: rh1so</a>
            <a href="https://steamcommunity.com/id/rh1so" class="link-tag">STEAM: rh1so</a>
        </div>

        <div id="projects-loader">
            <p>Загрузка проектов из облака...</p>
        </div>
    </div>

    <footer>
        &copy; 2026. Built by H1SO1. No AI-generated vibes here, just pure sweat.
    </footer>
</div>

<script>
    
    const SUPABASE_URL = 'https://ibybgkugoumvjftgxxii.supabase.co';
    const SUPABASE_KEY = 'sb_secret_hW7SHR0S3jguqCz5LCpoog_1IeXNLuS';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadContent() {
        const loader = document.getElementById('projects-loader');
        
        // Тянем проекты из таблицы 'projects'
        let { data: projects, error } = await supabase
            .from('projects')
            .select('*');

        if (error) {
            console.error(error);
            loader.innerHTML = "<p>Ошибка загрузки. Видимо, база прилегла отдохнуть.</p>";
            return;
        }

        if (projects.length === 0) {
            loader.innerHTML = "<p>Проектов пока нет. Всё в голове (или в черновиках).</p>";
            return;
        }

        loader.innerHTML = ''; // Очищаем лоадер

        projects.forEach(project => {
            const card = `
                <div class="card">
                    <h3>${project.name}</h3>
                    <p style="margin-top: 10px; font-size: 0.9rem; color: #888;">${project.desc}</p>
                    <a href="${project.link}" class="btn-reveal" target="_blank">View Project</a>
                </div>
            `;
            loader.innerHTML += card;
        });
    }

    // Погнали
    loadContent();

    // Пасхалка для консоли
    console.log("%c [SYS] Ошибка: Слишком много крутости обнаружено. ", "color: #00ffa3; font-weight: bold; background: #000; padding: 5px;");
</script>

</body>
</html>
