<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rh1so // FERUM.OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card: #0e0e11;
            --accent: #ff0055; /* ТВОЙ ОРИГИНАЛЬНЫЙ КРАСНЫЙ */
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #f0f0f0;
            --text-dim: #71717a;
            --radius-card: 32px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-main); min-height: 100vh; line-height: 1.6; }

        /* NAV (ВОССТАНОВЛЕНА) */
        nav {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(17, 17, 19, 0.7); backdrop-filter: blur(25px);
            padding: 8px; border-radius: 20px; border: 1px solid var(--border);
            display: flex; gap: 5px; z-index: 1000;
        }
        .nav-btn { padding: 12px 28px; border-radius: 14px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: #000; }

        .page { display: none; padding: 140px 20px 80px; max-width: 1000px; margin: 0 auto; animation: slideUp 0.6s ease forwards; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* BENTO (ТВОЙ ОРИГИНАЛ v4.5) */
        .bento-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .bento-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 40px; position: relative; overflow: hidden; transition: 0.3s; }
        .bento-card:hover { border-color: rgba(255, 0, 85, 0.3); transform: translateY(-3px); }
        .hero-card { grid-column: span 2; background: radial-gradient(circle at top right, #1a1616, #0e0e11); }
        .hero-card h1 { font-size: 4rem; letter-spacing: -4px; font-weight: 800; line-height: 1; }
        .hero-card h1 span { color: var(--accent); }

        .social-links { display: flex; gap: 12px; margin-top: 30px; }
        .social-btn { background: rgba(255,255,255,0.01); padding: 12px 24px; border-radius: 16px; text-decoration: none; color: #fff; font-size: 14px; border: 1px solid var(--border); transition: 0.3s; font-weight: 600; }
        .social-btn:hover { background: #fff; color: #000; border-color: #fff; }

        /* ARCHIVE (Forum) - ВОССТАНОВЛЕН */
        #forum-feed { display: grid; gap: 20px; }
        .post-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card); margin-bottom: 25px; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .post-card:hover { border-color: var(--accent); transform: scale(1.01); }
        .post-img { width: 100%; height: 350px; object-fit: cover; border-top: 1px solid var(--border); }

        /* MODAL */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; z-index: 2000; padding: 100px 40px; overflow-y: auto; }
        .close-btn { position: fixed; top: 30px; right: 30px; background: var(--card); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); color: #fff; cursor: pointer; z-index: 2001; }

        /* CHAT STYLE FOR MODAL */
        .chat-input { background: #16161a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #fff; margin-bottom: 10px; font-family: var(--font-mono); width: 100%; }
        .chat-input:focus { border-color: var(--accent); }

        /* TERMINAL */
        #term-body { background: #000; border: 1px solid var(--border); border-radius: 24px; padding: 30px; font-family: var(--font-mono); height: 450px; overflow-y: auto; color: var(--accent); font-size: 14px; }
        .matrix-mode { filter: sepia(1) hue-rotate(330deg) brightness(1.2) contrast(1.3) !important; text-shadow: 0 0 5px #ff0055 !important; }

        /* DESIGN OPT */
        .theme-list { position: absolute; top: 65px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: none; flex-direction: column; gap: 5px; min-width: 140px; z-index: 1001; }
        .theme-list.show { display: flex; }
        .t-opt { padding: 10px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 800; text-align: center; }
        .t-opt:hover { background: rgba(255,255,255,0.05); color: var(--accent); }

        @media (max-width: 768px) { .bento-grid { grid-template-columns: 1fr; } .hero-card h1 { font-size: 2.8rem; } }
    </style>
</head>
<body onwheel="playScroll()">

<nav>
    <button class="nav-btn active" onclick="switchTab('home', this)">Home</button>
    <button class="nav-btn" onclick="switchTab('forum', this)">Forum</button>
    <button class="nav-btn" onclick="switchTab('terminal', this)">Terminal</button>
    <button class="nav-btn" onclick="switchTab('secret', this)">Secret</button>
    <div class="theme-dropdown" style="position:relative;">
        <button class="nav-btn" onclick="toggleThemes()">Design</button>
        <div class="theme-list" id="themeList">
            <div class="t-opt" onclick="setTheme('#ff0055')">Arsenic</div>
            <div class="t-opt" onclick="setTheme('#00ffa3')">Emerald</div>
            <div class="t-opt" onclick="setTheme('#0088ff')">Cobalt</div>
        </div>
    </div>
</nav>

<div id="home" class="page active">
    <div class="bento-grid">
        <div class="bento-card hero-card" style="display: flex; justify-content: space-between;">
            <div>
                <p style="color: var(--accent); font-family: var(--font-mono); font-size: 11px; font-weight: 800; letter-spacing: 2px;">// FERUM_OS_v4.5.STABLE</p>
                <h1 style="margin-top: 10px;">FERUM<span>.OS</span></h1>
                <div class="social-links">
                    <a href="https://github.com/H1SO1" target="_blank" class="social-btn">GitHub</a>
                    <a href="https://t.me/rh1so" target="_blank" class="social-btn">Telegram</a>
                </div>
                <div style="margin-top: 45px; padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; gap: 20px; width: fit-content;">
                    <button onclick="toggleAudio()" id="pBtn" style="background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px;">▶</button>
                    <div>
                        <b style="font-size: 14px;">LOFI_CORE_RADIO</b><br>
                        <span id="radio-status" style="color: var(--text-dim); font-size: 11px; font-family: var(--font-mono);">STATUS: IDLE</span>
                    </div>
                </div>
            </div>
            <div style="text-align: right; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); display:flex; flex-direction:column; justify-content:space-between;">
                <div>
                    <div style="color: var(--accent); margin-bottom: 5px;">[ SYSTEM_MONITOR ]</div>
                    <div>UPTIME: <span id="uptime">00:00:00</span></div>
                    <div>NET_STABILITY: 99.2%</div>
                </div>
                <div id="date-now" style="opacity: 0.3;">2026.03.22</div>
            </div>
        </div>
        <div class="bento-card">
            <h3>Support</h3>
            <button onclick="openChat()" style="width:100%; margin-top:20px; padding:15px; border-radius:12px; border:none; background:var(--text-main); font-weight:800; cursor:pointer;">OPEN_COMM_LINK</button>
        </div>
        <div class="bento-card">
            <h3 style="color: var(--accent);">Skills</h3>
            <p style="color: var(--text-dim); font-size: 13px; margin-top: 10px;">HTML, JS, Supabase, C#, Unity, ARG</p>
        </div>
    </div>
</div>

<div id="forum" class="page">
    <h2 style="font-size: 3rem; margin-bottom: 40px; letter-spacing: -3px;">Archive</h2>
    <div id="forum-feed"></div>
</div>

<div id="terminal" class="page">
    <div id="term-body">Type 'help' for commands...</div>
    <div style="display: flex; gap: 10px; margin-top: 20px; background: #111; padding: 20px; border-radius: 16px; border: 1px solid var(--border);">
        <span style="color: var(--accent)">$</span>
        <input type="text" id="t-in" style="background:transparent; border:none; color:#fff; flex:1; font-family:var(--font-mono); font-size:16px;" onkeydown="runCmd(event); playKeyClick();">
    </div>
</div>

<div id="secret" class="page">
    <iframe id="rick" width="100%" height="500" src="" frameborder="0" style="border-radius: 32px; border: 1px solid var(--accent);"></iframe>
</div>

<div id="modal">
    <div class="close-btn" onclick="closeM()">[ CLOSE ]</div>
    <div id="mContent" style="max-width: 800px; margin: 0 auto; color:#ccc;"></div>
</div>

<audio id="player" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

<script>
    const sb = supabase.createClient('https://ibybgkugoumvjftgxxii.supabase.co', 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F');
    
    // --- AUDIO ENGINE ---
    const snd_click = new Audio('https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-one/plastic_impact_hard_001.mp3');
    const snd_key = new Audio('https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-four-o-four/mechanical_keyboard_key_press_001.mp3');
    const snd_beep = new Audio('https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-one/scifi_beep_002.mp3');
    const snd_scroll = new Audio('https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-four-o-four/mechanical_ticking_clock_gear_click.mp3');

    function playKeyClick() { let s = snd_key.cloneNode(); s.volume = 0.4; s.play(); }
    function playBeep() { snd_beep.play(); }
    let lastScroll = 0;
    function playScroll() {
        let now = Date.now();
        if(now - lastScroll > 150) { let s = snd_scroll.cloneNode(); s.volume = 0.1; s.play(); lastScroll = now; }
    }

    // --- SYSTEM CORE ---
    let startTime = Date.now();
    setInterval(() => {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let h = Math.floor(diff / 3600).toString().padStart(2, '0');
        let m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        let s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('uptime').innerText = `${h}:${m}:${s}`;
    }, 1000);
    document.getElementById('date-now').innerText = new Date().toISOString().split('T')[0];

    // --- UI & TABS ---
    function switchTab(id, btn) {
        snd_click.play();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.getElementById('rick').src = (id === 'secret') ? "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" : "";
        if(id === 'forum') loadForum();
    }
    function toggleThemes() { document.getElementById('themeList').classList.toggle('show'); snd_click.play(); }
    function setTheme(c) { document.documentElement.style.setProperty('--accent', c); localStorage.setItem('theme', c); document.getElementById('themeList').classList.remove('show'); }
    if(localStorage.getItem('theme')) setTheme(localStorage.getItem('theme'));
    function closeM() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

    // --- FORUM & IMAGES (ОРИГИНАЛ v4.5) ---
    async function loadForum() {
        const feed = document.getElementById('forum-feed');
        feed.innerHTML = '<p style="color:var(--accent);">SYNCING...</p>';
        const { data } = await sb.from('projects').select('*').order('id', { ascending: false });
        cachedPosts = data;
        feed.innerHTML = data.map((p, i) => `
            <div class="post-card" onclick="openP(${i})">
                <div style="padding: 40px;">
                    <div style="font-size: 10px; color: var(--accent); font-family: var(--font-mono);">ID: #${p.id}</div>
                    <h3>${p.name}</h3>
                    <p style="color: var(--text-dim);">${p.desc?.slice(0, 150)}...</p>
                </div>
                ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
            </div>
        `).join('');
    }
    function openP(i) {
        snd_click.play();
        const p = cachedPosts[i];
        document.getElementById('mContent').innerHTML = `
            ${p.image_url ? `<img src="${p.image_url}" style="width:100%; border-radius:24px; margin-bottom:30px;">` : ''}
            <h1>${p.name}</h1>
            <div style="white-space: pre-wrap; margin-top: 30px; font-size: 18px; line-height: 1.8;">${p.content || p.desc}</div>
        `;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    // --- SUPPORT CHAT ---
    function openChat() {
        snd_click.play();
        document.getElementById('mContent').innerHTML = `
            <h2>New Support Log</h2>
            <div style="margin-top:20px;">
                <input type="text" id="db-name" class="chat-input" placeholder="HANDLE" onkeypress="playKeyClick()">
                <textarea id="db-msg" class="chat-input" style="height:150px; resize:none;" placeholder="LOG_MESSAGE" onkeypress="playKeyClick()"></textarea>
                <button onclick="pushToDB()" style="background:var(--accent); border:none; padding:18px; border-radius:12px; font-weight:800; cursor:pointer;">PUSH_TO_CORE</button>
            </div>
        `;
        document.getElementById('modal').style.display = 'block';
    }
    async function pushToDB() {
        const name = document.getElementById('db-name').value;
        const msg = document.getElementById('db-msg').value;
        if(!name || !msg) return playBeep();
        const { error } = await sb.from('guestbook').insert([{ name, message: msg }]);
        if(error) playBeep(); else { closeM(); playBeep(); }
    }

    // --- AUDIO PLAYER & TERMINAL ---
    let isPlaying = false;
    function toggleAudio() {
        const p = document.getElementById('player'), b = document.getElementById('pBtn'), s = document.getElementById('radio-status');
        if(!isPlaying) { 
            p.play(); b.innerText = '■'; isPlaying = true; 
            s.innerText = "STREAMING..."; s.style.color = "var(--accent)";
        } else { 
            p.pause(); b.innerText = '▶'; isPlaying = false; 
            s.innerText = "PAUSED"; s.style.color = "var(--text-dim)";
        }
    }

    const termOut = document.getElementById('term-body'), termIn = document.getElementById('t-in');
    function runCmd(e) {
        if (e.key === 'Enter') {
            const cmd = termIn.value.toLowerCase().trim();
            let res = (cmd === 'help') ? 'help, neofetch, stalker, matrix, clear' : `Error: ${cmd}`;
            if(cmd === 'matrix') document.body.classList.toggle('matrix-mode');
            if(cmd === 'clear') { termOut.innerHTML = ''; termIn.value = ''; return; }
            playBeep();
            termOut.innerHTML += `<div>> ${cmd}<br>${res}</div><br>`;
            termOut.scrollTop = termOut.scrollHeight;
            termIn.value = '';
        }
    }
</script>
</body>
</html>
