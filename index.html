<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H1SO1 // FORUM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1014;
            --card: #191a1f;
            --accent: #00ffaa;
            --text-main: #f0f0f0;
            --text-dim: #888;
            --radius: 24px;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 0 auto; }

        /* --- Header --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 60px; background: var(--glass);
            padding: 20px 30px; border-radius: var(--radius);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* --- Nav Tags --- */
        .nav-tags { display: flex; gap: 10px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; }
        .tag {
            background: var(--card); padding: 10px 20px; border-radius: 50px;
            font-size: 13px; font-weight: 600; color: var(--text-dim);
            text-decoration: none; border: 1px solid transparent; transition: 0.3s;
            white-space: nowrap;
        }
        .tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,255,170,0.05); }

        /* --- Feed --- */
        #feed { display: grid; gap: 20px; }

        .post-card {
            background: var(--card); padding: 30px; border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.03); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .post-card:hover { transform: scale(1.01); background: #212228; border-color: rgba(255,255,255,0.1); }

        .post-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; color: var(--text-dim); }
        .post-title { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 10px; line-height: 1.2; }
        .post-preview { color: var(--text-dim); font-size: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- Full Post Overlay (Modal) --- */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; z-index: 1000;
            padding: 40px 20px; overflow-y: auto;
        }
        .modal-content {
            background: var(--card); width: 100%; max-width: 700px;
            height: fit-content; border-radius: var(--radius);
            padding: 50px; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-btn {
            position: absolute; top: 25px; right: 25px; width: 40px; height: 40px;
            background: var(--bg); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border);
        }

        /* Форматирование внутри поста */
        .rich-content img { width: 100%; border-radius: var(--radius); margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .rich-content b { color: var(--accent); }
        .rich-content p { margin-bottom: 15px; }

        /* Loader */
        .shimmer { height: 100px; background: linear-gradient(90deg, #191a1f 25%, #212228 50%, #191a1f 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: var(--radius); }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">FERUM<span>HUB</span></div>
        <div style="font-size: 12px; opacity: 0.5;">[ VERSION_12.0 ]</div>
    </header>

    <div class="nav-tags">
        <a href="https://github.com/H1SO1" class="tag" target="_blank">GITHUB</a>
        <a href="https://t.me/rh1so" class="tag" target="_blank">TELEGRAM</a>
        <a href="https://steamcommunity.com/id/rh1so" class="tag" target="_blank">STEAM</a>
        <a href="#" class="tag" onclick="alert('Это мой форум, Ярик!')">RULES</a>
    </div>

    <div id="feed">
        <div class="shimmer"></div>
        <div class="shimmer"></div>
    </div>
</div>

<div id="modal" onclick="closePost(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-btn" onclick="document.getElementById('modal').style.display='none'">×</div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://ibybgkugoumvjftgxxii.supabase.co';
    const SB_KEY = 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F'; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let allPosts = [];

    async function fetchPosts() {
        const feed = document.getElementById('feed');
        try {
            const { data, error } = await supabaseClient
                .from('projects') // Используем твою таблицу
                .select('*')
                .order('id', { ascending: false });

            if (error) throw error;
            allPosts = data;

            feed.innerHTML = '';
            data.forEach((post, index) => {
                feed.innerHTML += `
                    <div class="post-card" onclick="openPost(${index})">
                        <div class="post-header">
                            <span>ID: #${post.id}</span>
                            <span>${new Date().toLocaleDateString()}</span>
                        </div>
                        <h2 class="post-title">${post.name}</h2>
                        <div class="post-preview">${post.desc}</div>
                    </div>
                `;
            });
        } catch (e) {
            feed.innerHTML = `<p style="color: #ff4757">Ошибка загрузки: ${e.message}</p>`;
        }
    }

    function openPost(index) {
        const post = allPosts[index];
        const modal = document.getElementById('modal');
        const body = document.getElementById('modal-body');

        // Вставляем контент. Если в базе есть колонка 'content', используем её, иначе 'desc'
        const fullContent = post.content || post.desc;

        body.innerHTML = `
            <h1 style="font-size: 2.5rem; margin-bottom: 20px; line-height: 1.1;">${post.name}</h1>
            <div class="post-header" style="margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;">
                <span>AUTHOR: H1SO1</span>
                <span>REF_TYPE: FORUM_POST</span>
            </div>
            <div class="rich-content">
                ${post.image_url ? `<img src="${post.image_url}">` : ''}
                <div style="white-space: pre-wrap;">${fullContent}</div>
            </div>
        `;

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Запрет прокрутки фона
    }

    function closePost(e) {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    fetchPosts();
</script>

</body>
</html>
