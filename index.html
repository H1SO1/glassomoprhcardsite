<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ferum // FERUM.OS v7.0.0_STABLE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Базовая конфигурация (Retro Blood) */
            --accent-primary: #ff0055;
            --accent-glow: rgba(255, 0, 85, 0.3);
            --bg-ultra-black: #010101;
            --bg-card: #0c0c0e;
            --text-main: #e4e4e7;
            --text-muted: #71717a;
            --radius-xl: 40px;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        body {
            background-color: var(--bg-ultra-black);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- [ UI LAYERS ] --- */
        .crt-layer { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 10000; }
        
        #cursor-main { position: fixed; width: 10px; height: 10px; background: var(--accent-primary); border-radius: 50%; z-index: 11001; pointer-events: none; box-shadow: 0 0 15px var(--accent-primary); }
        #cursor-outline { position: fixed; width: 40px; height: 40px; border: 1px solid var(--accent-primary); border-radius: 50%; z-index: 11000; pointer-events: none; opacity: 0.4; transition: width 0.3s, height 0.3s; }

        /* --- [ LAYOUT ] --- */
        .bento-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 80px 40px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }

        .bento-node {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-xl);
            padding: 40px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .bento-node:hover {
            border-color: var(--accent-primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }

        .col-12 { grid-column: span 12; }
        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }

        /* --- [ ELEMENTS ] --- */
        .hero-text { font-size: clamp(3rem, 10vw, 8rem); font-weight: 800; letter-spacing: -6px; line-height: 0.9; margin-bottom: 20px; }
        .hero-text span { color: var(--accent-primary); transition: color 0.3s; }
        
        .log-prefix { font-family: var(--font-mono); color: var(--accent-primary); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }

        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(12,12,14,0.8); backdrop-filter: blur(20px); padding: 8px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: flex; gap: 5px; z-index: 9000; }
        .nav-item { padding: 12px 24px; border-radius: 20px; border: none; background: transparent; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; font-weight: 700; transition: 0.3s; }
        .nav-item.active { background: var(--accent-primary); color: #000; }

        /* --- [ GUESTBOOK FORM ] --- */
        .form-row { display: grid; grid-template-columns: 1fr 2fr auto; gap: 15px; margin-top: 20px; }
        .f-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; color: #fff; font-size: 15px; transition: 0.3s; width: 100%; }
        .f-input:focus { border-color: var(--accent-primary); outline: none; }
        .f-btn { background: var(--accent-primary); color: #000; border: none; padding: 0 30px; border-radius: 20px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .f-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* --- [ THEME GRID ] --- */
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .theme-btn { padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: #111; color: #fff; font-family: var(--font-mono); font-size: 10px; text-align: left; transition: 0.2s; }
        .theme-btn:hover { border-color: #fff; }

        /* --- [ ARCHIVE ] --- */
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: grid; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- [ MODAL ] --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10005; display: none; place-items: center; padding: 20px; opacity: 0; transition: 0.4s; }
        .modal-overlay.active { display: grid; opacity: 1; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--accent-primary); border-radius: var(--radius-xl); width: 100%; max-width: 900px; padding: 60px; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 30px; right: 30px; background: none; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="crt-layer"></div>
    <div id="cursor-main"></div>
    <div id="cursor-outline"></div>

    <nav class="nav-dock">
        <button class="nav-item active" onclick="kernel.switchTab('home', this)">// HOME</button>
        <button class="nav-item" onclick="kernel.switchTab('archive', this)">// ARCHIVE</button>
        <button class="nav-item" onclick="kernel.switchTab('config', this)">// CONFIG</button>
    </nav>

    <main class="bento-wrapper">
        <section id="home" class="tab-content active col-12" style="grid-template-columns: repeat(12, 1fr); gap: 24px;">
            <div class="bento-node col-8">
                <span class="log-prefix">System_Identity: FERUM.OS_V7</span>
                <h1 class="hero-text">FERUM<span>.OS</span></h1>
                <p style="color: var(--text-muted); font-size: 18px; line-height: 1.6; max-width: 500px;">
                    Центральный узел управления. Все системы синхронизированы. 
                    База данных Supabase: <span style="color: var(--accent-primary)">CONNECTED</span>.
                </p>
            </div>
            
            <div class="bento-node col-4">
                <span class="log-prefix">// SYSTEM_STATS</span>
                <div style="margin-top:20px">
                    <div style="font-size: 11px; color: var(--text-muted);">UPTIME</div>
                    <div id="uptime" style="font-size: 32px; font-weight: 800; font-family: var(--font-mono);">00:00:00</div>
                </div>
            </div>

            <div class="bento-node col-12">
                <span class="log-prefix">// DATA_INJECTION: GUESTBOOK</span>
                <div class="form-row">
                    <input type="text" id="in-name" class="f-input" placeholder="ИМЯ_ОПЕРАТОРА">
                    <input type="text" id="in-msg" class="f-input" placeholder="СООБЩЕНИЕ_ДЛЯ_УЗЛА">
                    <button class="f-btn" onclick="kernel.pushGuestbook()">EXECUTE</button>
                </div>
            </div>
        </section>

        <section id="archive" class="tab-content col-12">
            <div class="archive-grid" id="archive-render">
                </div>
        </section>

        <section id="config" class="tab-content col-12">
            <div class="bento-node col-12">
                <span class="log-prefix">// PRESET_MANAGER</span>
                <h2 style="font-size: 32px; margin-bottom: 20px;">30_SYSTEM_THEMES</h2>
                <div class="theme-grid" id="theme-render">
                    </div>
            </div>
        </section>
    </main>

    <div id="modal" class="modal-overlay" onclick="if(event.target==this) kernel.closeModal()">
        <div class="modal-box">
            <button class="close-btn" onclick="kernel.closeModal()">[X] CLOSE</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        class FerumOS {
            constructor() {
                this.client = supabase.createClient(
                    'https://ibybgkugoumvjftgxxii.supabase.co',
                    'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F'
                );

                this.themes = [
                    { n: 'Retro Blood', c: '#ff0055' }, { n: 'Cyber Pulse', c: '#00f2ff' },
                    { n: 'Toxic Void', c: '#bcff00' }, { n: 'Ghost Shell', c: '#ffffff' },
                    { n: 'Deep Purple', c: '#9d00ff' }, { n: 'Amber Alert', c: '#ffaa00' },
                    { n: 'Oceanic', c: '#0055ff' }, { n: 'Forest Echo', c: '#00ff66' },
                    { n: 'Barbie Core', c: '#ff66cc' }, { n: 'Matrix', c: '#22ff00' },
                    { n: 'Crimson', c: '#dc143c' }, { n: 'Gold Dust', c: '#ffd700' },
                    { n: 'Ice Cold', c: '#afeeee' }, { n: 'Hot Lava', c: '#ff4500' },
                    { n: 'Midnight', c: '#191970' }, { n: 'Slime', c: '#32cd32' },
                    { n: 'Sakura', c: '#ffb7c5' }, { n: 'Synthwave', c: '#ff00ff' },
                    { n: 'Blueprint', c: '#1e90ff' }, { n: 'Carbon', c: '#555555' },
                    { n: 'Bumblebee', c: '#f3ce13' }, { n: 'Radioactive', c: '#7fff00' },
                    { n: 'Vampire', c: '#8b0000' }, { n: 'Nordic', c: '#88c0d0' },
                    { n: 'Solar', c: '#d08770' }, { n: 'Marshmallow', c: '#f0f0f0' },
                    { n: 'Coffee', c: '#6f4e37' }, { n: 'Nebula', c: '#4b0082' },
                    { n: 'Acid', c: '#dfff00' }, { n: 'Void Walker', c: '#222222' }
                ];

                this.init();
            }

            init() {
                this.setupCursor();
                this.setupUptime();
                this.renderThemes();
                this.fetchArchive();
                console.log("FERUM.OS: All modules loaded.");
            }

            setupCursor() {
                const dot = document.getElementById('cursor-main');
                const ring = document.getElementById('cursor-outline');
                window.addEventListener('mousemove', e => {
                    dot.style.left = e.clientX + 'px';
                    dot.style.top = e.clientY + 'px';
                    ring.style.left = (e.clientX - 20) + 'px';
                    ring.style.top = (e.clientY - 20) + 'px';
                });
            }

            setupUptime() {
                const start = Date.now();
                setInterval(() => {
                    const s = Math.floor((Date.now() - start) / 1000);
                    document.getElementById('uptime').innerText = new Date(s * 1000).toISOString().substr(11, 8);
                }, 1000);
            }

            switchTab(id, btn) {
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            renderThemes() {
                const container = document.getElementById('theme-render');
                this.themes.forEach(t => {
                    const b = document.createElement('button');
                    b.className = 'theme-btn';
                    b.innerHTML = `<div style="width:10px;height:10px;background:${t.c};margin-bottom:5px"></div>${t.n}`;
                    b.onclick = () => {
                        document.documentElement.style.setProperty('--accent-primary', t.c);
                        document.documentElement.style.setProperty('--accent-glow', t.c + '44');
                    };
                    container.appendChild(b);
                });
            }

            async pushGuestbook() {
                const name = document.getElementById('in-name').value;
                const message = document.getElementById('in-msg').value;
                if(!name || !message) return alert("Empty fields!");

                const { error } = await this.client
                    .from('guestbook')
                    .insert([{ name, message }]); // Исправлено на name по твоему скрину

                if(error) console.error(error);
                else {
                    alert("Data Committed.");
                    document.getElementById('in-name').value = '';
                    document.getElementById('in-msg').value = '';
                }
            }

            async fetchArchive() {
                const { data } = await this.client.from('projects').select('*');
                const container = document.getElementById('archive-render');
                if(!data) return;

                container.innerHTML = data.map(p => `
                    <div class="bento-node" onclick="kernel.openModal('${p.name}', '${p.content || p.message}')">
                        <span class="log-prefix">PROJECT_ID: ${p.id}</span>
                        <h3 style="font-size:24px; margin-bottom:10px">${p.name}</h3>
                        <p style="color:var(--text-muted); font-size:14px">${(p.content || p.message || '').substring(0, 100)}...</p>
                    </div>
                `).join('');
            }

            openModal(title, text) {
                const m = document.getElementById('modal');
                document.getElementById('modal-content').innerHTML = `
                    <h1 style="font-size:3rem; margin-bottom:20px">${title}</h1>
                    <div style="font-family:var(--font-mono); line-height:1.6; background:#000; padding:20px; border-radius:10px">${text}</div>
                `;
                m.classList.add('active');
            }

            closeModal() { document.getElementById('modal').classList.remove('active'); }
        }

        const kernel = new FerumOS();
    </script>
</body>
</html>
