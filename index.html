<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H1SO1 // DIGITAL_OBSIDIAN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0e;
            --accent: #00ffaa;
            --border: #1a1a1f;
            --text-main: #d1d1d1;
            --text-dim: #666;
            --font: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font);
            display: flex; justify-content: center;
        }

        .layout {
            width: 100%; max-width: 1000px;
            display: grid; grid-template-columns: 280px 1fr;
            min-height: 100vh; border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Sidebar (Obsidian Style) */
        aside {
            padding: 40px 25px; border-right: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
        }

        .brand { font-weight: 700; font-size: 1.2rem; color: #fff; margin-bottom: 50px; }
        .brand span { color: var(--accent); }

        .nav-section { margin-bottom: 30px; }
        .nav-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .nav-link {
            display: block; color: var(--text-main); text-decoration: none;
            padding: 8px 0; font-size: 13px; transition: 0.2s;
        }
        .nav-link:hover { color: var(--accent); padding-left: 5px; }

        /* Main Feed */
        main { padding: 40px 50px; background: #08080a; }
        
        .bio { margin-bottom: 60px; max-width: 500px; }
        .bio p { font-size: 14px; color: #aaa; margin-top: 10px; }

        .section-header {
            font-size: 14px; font-weight: 700; color: #fff;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
            margin-bottom: 30px; display: flex; align-items: center; gap: 10px;
        }

        /* Project Nodes */
        .node {
            margin-bottom: 40px; position: relative;
            padding-left: 20px; border-left: 1px solid var(--border);
            transition: 0.3s;
        }
        .node:hover { border-left-color: var(--accent); }

        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .node-title { font-size: 18px; color: #fff; font-weight: 700; }
        .node-id { font-size: 10px; color: var(--text-dim); }

        .node-content { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.8; }

        /* Reveal Button */
        .btn {
            display: inline-block; padding: 10px 20px;
            border: 1px solid var(--accent); color: var(--accent);
            text-decoration: none; font-size: 12px; font-weight: 700;
            position: relative; overflow: hidden; z-index: 1;
        }
        .btn::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; background: var(--accent);
            border-radius: 50%; transform: translate(-50%, -50%);
            transition: 0.4s; z-index: -1;
        }
        .btn:hover { color: #000; }
        .btn:hover::after { width: 300px; height: 300px; }

        .error-msg { color: #ff4757; border: 1px dashed #ff4757; padding: 20px; font-size: 12px; }

        @media (max-width: 800px) {
            .layout { grid-template-columns: 1fr; }
            aside { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <div class="layout">
        <aside>
            <div class="brand">FERUM<span>.sys</span></div>
            
            <div class="nav-section">
                <div class="nav-label">Identity</div>
                <a href="https://github.com/H1SO1" class="nav-link" target="_blank">> GitHub</a>
                <a href="https://t.me/rh1so" class="nav-link" target="_blank">> Telegram</a>
                <a href="https://steamcommunity.com/id/rh1so" class="nav-link" target="_blank">> Steam</a>
            </div>

            <div class="nav-section" style="margin-top: 200px">
                <div class="nav-label">System</div>
                <div id="uptime" style="font-size: 11px; color: var(--text-dim);">Uptime: 00:00:00</div>
            </div>
        </aside>

        <main>
            <section class="bio">
                <h1 style="color:#fff">H1SO1_</h1>
                <p>Digital architect & content creator. Исследую ARG, пишу код и страдаю над Вариантом 7. Больше текста — больше смысла.</p>
            </section>

            <div class="section-header"># PROJECTS_FEED</div>

            <div id="feed">
                <p style="color: var(--text-dim)">[ Инициализация потока данных... ]</p>
            </div>
        </main>
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const SB_URL = 'https://ibybgkugoumvjftgxxii.supabase.co';
        const SB_KEY = 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F'; // Используем PUBLISHABLE

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function getProjects() {
            const feed = document.getElementById('feed');
            
            try {
                const { data, error } = await supabaseClient
                    .from('projects')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    feed.innerHTML = `
                        <div class="error-msg">
                            [WARNING]: Данные не получены. <br>
                            1. Проверь таблицу 'projects' в Supabase. <br>
                            2. Убедись, что создана политика RLS (Read Access).
                        </div>`;
                    return;
                }

                feed.innerHTML = '';
                data.forEach(item => {
                    feed.innerHTML += `
                        <div class="node">
                            <div class="node-header">
                                <span class="node-title">${item.name}</span>
                                <span class="node-id">PROJECT_REF_${item.id}</span>
                            </div>
                            <div class="node-content">${item.desc || 'Нет описания.'}</div>
                            <a href="${item.link}" class="btn" target="_blank">EXECUTE_URL</a>
                        </div>
                    `;
                });

            } catch (e) {
                console.error(e);
                feed.innerHTML = `<div class="error-msg">[CRITICAL_ERROR]: ${e.message}</div>`;
            }
        }

        // Счетчик аптайма (просто для вайба)
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('uptime').innerText = `Uptime: ${h}:${m}:${s}`;
        }, 1000);

        getProjects();
    </script>
</body>
</html>
