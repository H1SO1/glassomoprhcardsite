<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rh1so // FERUM.OS v4.8.FINAL_FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; --card: #0e0e11; --accent: #ff0055; --border: rgba(255, 255, 255, 0.06);
            --text-main: #f0f0f0; --text-dim: #71717a; --nav-bg: rgba(17, 17, 19, 0.8);
            --radius: 32px; --font-main: 'Plus Jakarta Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-main); min-height: 100vh; overflow-x: hidden; transition: 0.4s; }

        /* NAV & THEMES */
        nav { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--nav-bg); backdrop-filter: blur(25px); padding: 8px; border-radius: 20px; border: 1px solid var(--border); display: flex; gap: 5px; z-index: 1000; }
        .nav-btn { padding: 12px 25px; border-radius: 14px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; font-size: 13px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: #000; }

        .theme-menu { position: absolute; top: 75px; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; display: none; flex-direction: column; gap: 8px; min-width: 200px; z-index: 1001; }
        .theme-menu.show { display: flex; }
        .t-item { padding: 12px; border-radius: 12px; cursor: pointer; font-family: var(--font-mono); font-size: 11px; display: flex; align-items: center; gap: 10px; }
        .t-item:hover { background: var(--accent); color: #000; }

        .ghost-mode { --nav-bg: rgba(0, 0, 0, 0.8); --border: rgba(0, 0, 0, 0.1); }

        /* BENTO */
        .page { display: none; padding: 140px 20px 80px; max-width: 1000px; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        .page.active { display: block; }
        .bento-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .bento-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; position: relative; overflow: hidden; }
        
        .hero-card { grid-column: span 2; min-height: 420px; display: flex; flex-direction: column; justify-content: space-between; }
        .hero-card h1 { font-size: 5.5rem; letter-spacing: -6px; font-weight: 800; line-height: 0.9; margin: 20px 0; }
        .hero-card h1 span { color: var(--accent); }

        .player-bar { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; padding: 15px 25px; display: flex; align-items: center; gap: 20px; width: fit-content; }
        .p-play { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--accent); cursor: pointer; font-size: 18px; }

        .hero-art { position: absolute; right: 40px; bottom: 40px; text-align: right; opacity: 0.1; pointer-events: none; }
        .frm-txt { font-size: 9rem; font-weight: 900; letter-spacing: -12px; }

        /* ARCHIVE */
        .post-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 25px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .post-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .post-img { width: 100%; height: 350px; object-fit: cover; }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: var(--bg); display: none; z-index: 4000; padding: 80px 20px; overflow-y: auto; }
        .modal-content { max-width: 800px; margin: 0 auto; }

        /* DRAGGABLE */
        #drag-win { position: fixed; top: 20%; left: 30%; width: 400px; background: rgba(14, 14, 17, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--accent); border-radius: 24px; z-index: 3000; display: none; }
        .win-header { padding: 15px 20px; cursor: move; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }

        /* TERMINAL */
        #term-body { background: #000; border-radius: 24px; padding: 30px; font-family: var(--font-mono); height: 450px; overflow-y: auto; color: var(--accent); border: 1px solid var(--border); font-size: 14px; line-height: 1.6; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onwheel="playSnd('scroll')">

<nav>
    <button class="nav-btn active" onclick="switchTab('home', this)">Home</button>
    <button class="nav-btn" onclick="switchTab('forum', this)">Archive</button>
    <button class="nav-btn" onclick="switchTab('terminal', this)">Terminal</button>
    <div style="position: relative;">
        <button class="nav-btn" onclick="toggleT()">Design</button>
        <div class="theme-menu" id="tMenu">
            <div class="t-item" onclick="applyTheme('crimson')">CRIMSON</div>
            <div class="t-item" onclick="applyTheme('arsenic')">ARSENIC</div>
            <div class="t-item" onclick="applyTheme('vapor')">VAPOR_WAVE</div>
            <div class="t-item" onclick="applyTheme('ghost')">GHOST_WHITE</div>
        </div>
    </div>
</nav>

<div id="home" class="page active">
    <div class="bento-grid">
        <div class="bento-card hero-card">
            <div>
                <p style="color: var(--accent); font-family: var(--font-mono); font-size: 11px;">// FERUM_OS_v4.8</p>
                <h1>FERUM<span>.OS</span></h1>
                <div class="player-bar" style="margin-top: 30px;">
                    <button class="p-play" onclick="toggleAudio()" id="pBtn">▶</button>
                    <div>
                        <div style="font-weight: 800; font-size: 14px;">RADIO_INFUSION</div>
                        <div id="radio-status" style="font-size: 10px; color: var(--text-dim);">STATUS: IDLE</div>
                    </div>
                </div>
            </div>
            <div class="hero-art"><div class="frm-txt">FRM</div></div>
        </div>
        <div class="bento-card">
            <h3 style="color: var(--accent)">Core_Link</h3>
            <button onclick="toggleWin(true)" style="width:100%; margin-top:20px; padding:20px; border-radius:15px; border:none; background:#fff; color:#000; font-weight:800; cursor:pointer;">WRITE_LOG</button>
        </div>
    </div>
</div>

<div id="forum" class="page">
    <div id="forum-feed"></div>
</div>

<div id="terminal" class="page">
    <div id="term-body">FERUM.OS [Terminal v4.8]<br>Type 'help' for commands.</div>
    <div style="display:flex; gap:10px; margin-top:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border);">
        <span style="color:var(--accent)">$</span>
        <input type="text" id="t-in" onkeydown="handleTerm(event)" oninput="playSnd('key')" style="background:transparent; border:none; color:inherit; flex:1; font-family:var(--font-mono);">
    </div>
</div>

<div id="modal">
    <button onclick="closeM()" style="position:fixed; top:30px; right:30px; padding:15px; background:var(--card); border:1px solid var(--border); color:#fff; cursor:pointer; border-radius:12px;">[ CLOSE ]</button>
    <div class="modal-content" id="mContent"></div>
</div>

<div id="drag-win">
    <div class="win-header" id="win-handle"><span>UPLINK</span><span onclick="toggleWin(false)" style="cursor:pointer;">[X]</span></div>
    <div style="padding:25px;">
        <input type="text" id="db-n" placeholder="NAME" style="width:100%; padding:15px; background:#000; border:1px solid var(--border); color:#fff; margin-bottom:10px; border-radius:10px;">
        <textarea id="db-m" placeholder="MESSAGE" style="width:100%; height:100px; padding:15px; background:#000; border:1px solid var(--border); color:#fff; border-radius:10px; resize:none;"></textarea>
        <button onclick="send()" style="width:100%; margin-top:15px; padding:15px; background:var(--accent); border:none; font-weight:800; border-radius:10px; cursor:pointer;">SEND_PACKET</button>
    </div>
</div>

<audio id="player" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

<script>
    const sb = supabase.createClient('https://ibybgkugoumvjftgxxii.supabase.co', 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F');
    const snds = {
        key: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
        scroll: new Audio('https://assets.mixkit.co/active_storage/sfx/2562/2562-preview.mp3')
    };
    function playSnd(t) { let s = snds[t].cloneNode(); s.volume = (t==='scroll')?0.05:0.2; s.play().catch(()=>{}); }

    // THEMES
    const themes = {
        crimson: { bg: '#030303', card: '#0e0e11', accent: '#ff0055', text: '#f0f0f0' },
        arsenic: { bg: '#030303', card: '#0e0e11', accent: '#00ffa3', text: '#f0f0f0' },
        vapor: { bg: '#080008', card: '#1a001a', accent: '#ff00ff', text: '#ffe0ff' },
        ghost: { bg: '#f5f5f7', card: '#fff', accent: '#000', text: '#000', mode: 'ghost' }
    };
    function applyTheme(t) {
        const th = themes[t]; const r = document.documentElement.style;
        r.setProperty('--bg', th.bg); r.setProperty('--card', th.card); r.setProperty('--accent', th.accent);
        r.setProperty('--text-main', th.text);
        document.body.className = th.mode === 'ghost' ? 'ghost-mode' : '';
        toggleT(); playSnd('click');
    }

    // TERMINAL ENGINE
    function handleTerm(e) {
        if(e.key === 'Enter') {
            const cmd = e.target.value.toLowerCase();
            const out = document.getElementById('term-body');
            out.innerHTML += `<div><span style="color:var(--text-dim)">$</span> ${cmd}</div>`;
            
            if(cmd === 'help') out.innerHTML += `<div>Available: help, clear, neofetch, matrix, about</div>`;
            else if(cmd === 'clear') out.innerHTML = 'Terminal cleared.';
            else if(cmd === 'neofetch') out.innerHTML += `<div><span style="color:var(--accent)">OS:</span> FERUM.OS v4.8<br><span style="color:var(--accent)">Uptime:</span> Online<br><span style="color:var(--accent)">Shell:</span> zsh/ferum</div>`;
            else if(cmd === 'matrix') out.innerHTML += `<div style="color:#0f0">Wake up, Neo... The Matrix has you.</div>`;
            else if(cmd === 'about') out.innerHTML += `<div>FERUM.OS - Subjective creative environment. [IMHO]</div>`;
            
            out.scrollTop = out.scrollHeight; e.target.value = '';
        }
    }

    // DRAGGABLE
    const win = document.getElementById('drag-win'), handle = document.getElementById('win-handle');
    let isD = false, off = [0,0];
    handle.onmousedown = (e) => { isD = true; off = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY]; };
    document.onmousemove = (e) => { if(isD) { win.style.left = (e.clientX + off[0]) + 'px'; win.style.top = (e.clientY + off[1]) + 'px'; } };
    document.onmouseup = () => isD = false;

    function toggleWin(s) { playSnd('click'); win.style.display = s ? 'block' : 'none'; }
    function toggleT() { document.getElementById('tMenu').classList.toggle('show'); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    // ARCHIVE ENGINE (FIXED)
    async function loadForum() {
        const feed = document.getElementById('forum-feed');
        const { data } = await sb.from('projects').select('*').order('id', { ascending: false });
        feed.innerHTML = data.map(p => `
            <div class="post-card" onclick='openP(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                ${p.image_url ? `<img src="${p.image_url}" class="post-img">` : ''}
                <div style="padding:40px;"><h3>${p.name}</h3><p style="color:var(--text-dim); margin-top:10px;">${p.desc}</p></div>
            </div>
        `).join('');
    }

    function openP(p) {
        playSnd('click');
        document.getElementById('mContent').innerHTML = `
            ${p.image_url ? `<img src="${p.image_url}" style="width:100%; border-radius:32px; margin-bottom:40px;">` : ''}
            <h1 style="font-size:3rem;">${p.name}</h1>
            <div style="margin-top:20px; line-height:1.8; color:var(--text-dim);">${p.content || p.desc}</div>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function switchTab(id, btn) {
        playSnd('click');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'forum') loadForum();
    }

    let isPlaying = false;
    function toggleAudio() {
        const p = document.getElementById('player'), b = document.getElementById('pBtn'), s = document.getElementById('radio-status');
        if(!isPlaying) { p.play(); b.innerText = '■'; isPlaying = true; s.innerText = "STATUS: STREAMING"; }
        else { p.pause(); b.innerText = '▶'; isPlaying = false; s.innerText = "STATUS: IDLE"; }
    }
</script>
</body>
</html>
