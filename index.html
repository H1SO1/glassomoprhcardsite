<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERUM.OS // VIBE_RESTORATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; --card: #0e0e11; --accent: #00ffa3; --border: rgba(255, 255, 255, 0.06);
            --text-main: #f0f0f0; --text-dim: #71717a; --radius: 32px;
            --font-main: 'Plus Jakarta Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; transition: background 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font-main); min-height: 100vh; line-height: 1.6; }

        /* NAV (БЕЗ ИЗМЕНЕНИЙ) */
        nav { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(var(--card-rgb), 0.7); backdrop-filter: blur(25px); padding: 8px; border-radius: 20px; border: 1px solid var(--border); display: flex; gap: 5px; z-index: 1000; }
        .nav-btn { padding: 12px 28px; border-radius: 14px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; font-size: 14px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: #000; }

        /* BENTO (ТВОЙ v4.5) */
        .page { display: none; padding: 140px 20px 80px; max-width: 1000px; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        .page.active { display: block; }
        .bento-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .bento-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; position: relative; overflow: hidden; }
        .bento-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.1); }
        .hero-card { grid-column: span 2; }
        .hero-card h1 { font-size: 4rem; letter-spacing: -4px; font-weight: 800; line-height: 1; }
        .hero-card h1 span { color: var(--accent); }

        /* THEME LIST */
        .theme-list { position: absolute; top: 65px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: none; flex-direction: column; gap: 5px; min-width: 160px; z-index: 1001; }
        .theme-list.show { display: flex; }
        .t-opt { padding: 10px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 800; font-family: var(--font-mono); display: flex; align-items: center; gap: 10px; }
        .t-opt:hover { background: rgba(255,255,255,0.05); }

        /* CHAT / MODAL */
        #modal { position: fixed; inset: 0; background: var(--bg); display: none; z-index: 2000; padding: 100px 40px; overflow-y: auto; }
        .chat-input { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 20px; color: #fff; width: 100%; font-family: var(--font-mono); margin-bottom: 15px; }
        .chat-input:focus { border-color: var(--accent); }
        .status-msg { font-family: var(--font-mono); font-size: 12px; color: var(--accent); margin-top: 10px; display: none; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onwheel="playSnd('scroll')">

<nav>
    <button class="nav-btn active" onclick="switchTab('home', this)">Home</button>
    <button class="nav-btn" onclick="switchTab('forum', this)">Forum</button>
    <button class="nav-btn" onclick="switchTab('terminal', this)">Terminal</button>
    <div style="position:relative;">
        <button class="nav-btn" onclick="toggleT()">Design</button>
        <div class="theme-list" id="tList">
            <div class="t-opt" onclick="applyTheme('arsenic')"><div style="width:8px;height:8px;border-radius:50%;background:#00ffa3"></div> Arsenic</div>
            <div class="t-opt" onclick="applyTheme('crimson')"><div style="width:8px;height:8px;border-radius:50%;background:#ff0055"></div> Crimson</div>
            <div class="t-opt" onclick="applyTheme('void')"><div style="width:8px;height:8px;border-radius:50%;background:#ff7b00"></div> Void (OLED)</div>
            <div class="t-opt" onclick="applyTheme('ghost')"><div style="width:8px;height:8px;border-radius:50%;background:#000;border:1px solid #ccc"></div> Ghost</div>
        </div>
    </div>
</nav>

<div id="home" class="page active">
    <div class="bento-grid">
        <div class="bento-card hero-card" style="display: flex; justify-content: space-between;">
            <div>
                <p style="color: var(--accent); font-family: var(--font-mono); font-size: 11px; font-weight: 800;">// FERUM_OS_v4.5.VIBE</p>
                <h1 style="margin-top: 15px;">FERUM<span>.OS</span></h1>
                <div style="margin-top: 40px; display: flex; gap: 15px; align-items: center;">
                    <button onclick="toggleAudio()" id="pBtn" style="width:50px; height:50px; border-radius:50%; border:none; background:var(--accent); cursor:pointer;">▶</button>
                    <span id="radio-status" style="font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);">RADIO_IDLE</span>
                </div>
            </div>
            <div style="text-align: right; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);">
                <div style="color: var(--accent)">[ SYSTEM_HEALTH ]</div>
                <div>UPTIME: <span id="uptime">00:00:00</span></div>
            </div>
        </div>
        <div class="bento-card">
            <h3 style="color: var(--accent)">Core_Link</h3>
            <button onclick="openChat()" style="width:100%; margin-top:20px; padding:18px; border-radius:14px; border:none; background:var(--text-main); font-weight:800; cursor:pointer;">WRITE_LOG</button>
        </div>
        <div class="bento-card">
            <h3>Skills</h3>
            <p style="color: var(--text-dim); font-size: 13px; margin-top: 10px;">UI Architecture / C# / Supabase</p>
        </div>
    </div>
</div>

<div id="forum" class="page">
    <h2 style="font-size: 3rem; margin-bottom: 30px;">Archive</h2>
    <div id="forum-feed"></div>
</div>

<div id="modal">
    <div onclick="closeM()" style="position:fixed; top:30px; right:30px; cursor:pointer; font-weight:800;">[ CLOSE ]</div>
    <div id="mContent" style="max-width: 600px; margin: 0 auto;"></div>
</div>

<audio id="player" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

<script>
    const sb = supabase.createClient('https://ibybgkugoumvjftgxxii.supabase.co', 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F');
    
    // --- SOUNDS (FIXED) ---
    const snds = {
        key: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
        scroll: new Audio('https://assets.mixkit.co/active_storage/sfx/2562/2562-preview.mp3')
    };

    function playSnd(type) {
        let s = snds[type].cloneNode();
        s.volume = (type === 'scroll') ? 0.05 : 0.2;
        s.play().catch(() => {}); // Игнорим если браузер блочит до первого клика
    }

    // --- THEMES ---
    const themes = {
        arsenic: { bg: '#030303', card: '#0e0e11', accent: '#00ffa3', text: '#f0f0f0', dim: '#71717a' },
        crimson: { bg: '#080204', card: '#120509', accent: '#ff0055', text: '#f0f0f0', dim: '#7a7174' },
        void: { bg: '#000000', card: '#050505', accent: '#ff7b00', text: '#ffffff', dim: '#444444' },
        ghost: { bg: '#f5f5f7', card: '#ffffff', accent: '#000000', text: '#121212', dim: '#666666' }
    };

    function applyTheme(t) {
        const theme = themes[t];
        const r = document.documentElement.style;
        r.setProperty('--bg', theme.bg);
        r.setProperty('--card', theme.card);
        r.setProperty('--accent', theme.accent);
        r.setProperty('--text-main', theme.text);
        r.setProperty('--text-dim', theme.dim);
        playSnd('click');
        toggleT();
    }

    // --- UI ENGINE ---
    function toggleT() { document.getElementById('tList').classList.toggle('show'); }
    function switchTab(id, btn) {
        playSnd('click');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function openChat() {
        playSnd('click');
        document.getElementById('mContent').innerHTML = `
            <h2 style="font-family:var(--font-mono); margin-bottom:20px;">Establishing Link...</h2>
            <input type="text" id="db-name" class="chat-input" placeholder="HANDLE" onkeypress="playSnd('key')">
            <textarea id="db-msg" class="chat-input" style="height:150px; resize:none;" placeholder="DATA_PACKET" onkeypress="playSnd('key')"></textarea>
            <div id="status" class="status-msg">ENCRYPTING_AND_SENDING...</div>
            <button onclick="sendToDB()" style="width:100%; padding:20px; border-radius:16px; border:none; background:var(--accent); font-weight:800; cursor:pointer;">PUSH_DATA</button>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    async function sendToDB() {
        const name = document.getElementById('db-name').value;
        const msg = document.getElementById('db-msg').value;
        const st = document.getElementById('status');
        if(!name || !msg) return;
        
        st.style.display = 'block';
        const { error } = await sb.from('guestbook').insert([{ name, message: msg }]);
        
        if(!error) {
            st.innerText = "PACKET_SENT_SUCCESSFULLY.";
            setTimeout(() => { closeM(); }, 1500);
        }
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    // --- SYSTEM ---
    let start = Date.now();
    setInterval(() => {
        let diff = Math.floor((Date.now() - start)/1000);
        let h = Math.floor(diff/3600).toString().padStart(2,'0');
        let m = Math.floor((diff%3600)/60).toString().padStart(2,'0');
        let s = (diff%60).toString().padStart(2,'0');
        document.getElementById('uptime').innerText = `${h}:${m}:${s}`;
    }, 1000);

    let isPlaying = false;
    function toggleAudio() {
        const p = document.getElementById('player'), b = document.getElementById('pBtn'), s = document.getElementById('radio-status');
        if(!isPlaying) { p.play(); b.innerText = '■'; isPlaying = true; s.innerText = "STREAMING..."; }
        else { p.pause(); b.innerText = '▶'; isPlaying = false; s.innerText = "RADIO_IDLE"; }
    }
</script>
</body>
</html>
