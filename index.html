<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ferum // FERUM.OS v6.8.1_STABLE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* [ CSS KERNEL v6.8.1 ] */
        :root {
            --bg-ultra-black: #010101;
            --bg-card: #0c0c0e;
            --accent-primary: #ff0055;
            --accent-glow: rgba(255, 0, 85, 0.35);
            --text-main: #e4e4e7;
            --text-muted: #71717a;
            --radius-xl: 42px;
            --font-mono: 'JetBrains Mono', monospace;
            --transition-main: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Твои темы из конфига */
        [data-theme="cyber"] { --accent-primary: #00f2ff; --accent-glow: rgba(0, 242, 255, 0.35); }
        [data-theme="toxic"] { --accent-primary: #bcff00; --accent-glow: rgba(188, 255, 0, 0.35); }
        [data-theme="ghost"] { --accent-primary: #ffffff; --accent-glow: rgba(255, 255, 255, 0.2); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body { background: var(--bg-ultra-black); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* Эффекты CRT и Курсор */
        .crt-layer { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.12) 50%), linear-gradient(90deg, rgba(255,0,0,0.01), rgba(0,255,0,0.01), rgba(0,0,255,0.01)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 10000; }
        #cursor-main { position: fixed; width: 10px; height: 10px; background: var(--accent-primary); border-radius: 50%; z-index: 11001; pointer-events: none; box-shadow: 0 0 15px var(--accent-primary); }
        #cursor-outline { position: fixed; width: 40px; height: 40px; border: 1px solid var(--accent-primary); border-radius: 50%; z-index: 11000; pointer-events: none; opacity: 0.4; transition: width 0.3s, height 0.3s; }

        /* Bento Grid */
        .bento-wrapper { max-width: 1600px; margin: 0 auto; padding: 100px 40px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
        .bento-node { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-xl); padding: 40px; position: relative; overflow: hidden; transition: var(--transition-main); display: flex; flex-direction: column; }
        .bento-node:hover { border-color: var(--accent-primary); transform: translateY(-8px); box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow); }

        .col-12 { grid-column: span 12; } .col-8 { grid-column: span 8; } .col-4 { grid-column: span 4; } .row-2 { grid-row: span 2; }

        /* UI Elements */
        .hero-text { font-size: clamp(3.5rem, 12vw, 10rem); font-weight: 800; letter-spacing: -8px; line-height: 0.85; margin-bottom: 20px; }
        .hero-text span { color: var(--accent-primary); }
        .log-prefix { font-family: var(--font-mono); color: var(--accent-primary); font-size: 11px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; display: block; }

        /* Навигация */
        .nav-dock { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(12,12,14,0.8); backdrop-filter: blur(25px); padding: 10px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); display: flex; gap: 8px; z-index: 9000; }
        .nav-item { padding: 14px 28px; border-radius: 20px; border: none; background: transparent; color: var(--text-muted); font-family: var(--font-mono); font-size: 13px; font-weight: 800; transition: 0.3s; }
        .nav-item.active { background: var(--accent-primary); color: #000; }

        /* Radio & Visualizer */
        .vhs-strip { display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .play-trigger { background: var(--accent-primary); border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 10px; }
        .vhs-visualizer { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
        .vhs-visualizer div { width: 2px; background: var(--accent-primary); }
        .active-audio .vhs-visualizer div { animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 2px; } to { height: 100%; } }

        /* Theme Grid */
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; }
        .theme-card { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; font-family: var(--font-mono); font-size: 11px; text-align: left; }

        /* Modal */
        .ferum-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(40px); z-index: 10005; display: none; place-items: center; padding: 40px; opacity: 0; transition: 0.4s; }
        .ferum-modal-overlay.active { display: grid; opacity: 1; }
        .modal-content-wrap { background: var(--bg-card); width: 100%; max-width: 1200px; border-radius: var(--radius-xl); border: 1px solid var(--accent-primary); padding: 60px; position: relative; }

        .tab-content { display: none; }
        .active-tab { display: contents; }
        #archive, #secret, #config { display: none; } /* По умолчанию скрыты */
    </style>
</head>
<body>

    <div class="crt-layer"></div>
    <div id="cursor-main"></div>
    <div id="cursor-outline"></div>

    <nav class="nav-dock">
        <button class="nav-item active" onclick="kernel.switchTab('home', this)">// 01_HOME</button>
        <button class="nav-item" onclick="kernel.switchTab('archive', this)">// 02_ARCHIVE</button>
        <button class="nav-item" onclick="kernel.switchTab('secret', this)">// 03_SECRET</button>
        <button class="nav-item" onclick="kernel.switchTab('config', this)">// 04_CONFIG</button>
    </nav>

    <main class="bento-wrapper">
        <section id="home" class="tab-content active-tab col-12">
            <div class="bento-node col-8 row-2">
                <span class="log-prefix">System_Identity: FERUM_OS_V6.8.1</span>
                <h1 class="hero-text">FERUM<span>.OS</span></h1>
                <p style="color: var(--text-muted); font-size: 18px; line-height: 1.6;">Центральный узел управления. База данных Supabase: <span style="color: var(--accent-primary)">CONNECTED</span>.</p>
                
                <div class="audio-deck" style="margin-top: 40px;">
                    <div class="vhs-strip" id="audio-0">
                        <button class="play-trigger" onclick="kernel.toggleAudio(0)">PLAY</button>
                        <div><span class="log-prefix" style="margin:0">CH_01_PHONK</span><div class="vhs-visualizer" id="viz-0"></div></div>
                    </div>
                    <div class="vhs-strip" id="audio-1" style="margin-top:10px">
                        <button class="play-trigger" onclick="kernel.toggleAudio(1)">PLAY</button>
                        <div><span class="log-prefix" style="margin:0">CH_02_LOFI</span><div class="vhs-visualizer" id="viz-1"></div></div>
                    </div>
                </div>

                <div style="margin-top: auto; display: flex; gap: 20px;">
                    <a href="#" class="log-prefix" style="text-decoration: none;">[ TG ]</a>
                    <a href="#" class="log-prefix" style="text-decoration: none;">[ GIT ]</a>
                    <a href="#" class="log-prefix" style="text-decoration: none;">[ STEAM ]</a>
                </div>
            </div>

            <div class="bento-node col-4">
                <span class="log-prefix">// SYSTEM_STATS</span>
                <div style="font-size: 32px; font-weight: 800; font-family: var(--font-mono);" id="uptime-display">00:00:00</div>
            </div>

            <div class="bento-node col-4">
                <span class="log-prefix">// KERNEL_LOGS</span>
                <div id="mini-terminal" style="font-family: var(--font-mono); font-size: 11px; color: var(--accent-primary); height: 150px; overflow: hidden;"></div>
            </div>

            <div class="bento-node col-12">
                <span class="log-prefix">// DATA_INJECTION: GUESTBOOK</span>
                <div style="display: grid; grid-template-columns: 1fr 2fr auto; gap: 20px; margin-top: 10px;">
                    <input type="text" id="gb-user" style="background:#000; border:1px solid #333; padding:20px; border-radius:15px; color:#fff;" placeholder="ОПЕРАТОР">
                    <input type="text" id="gb-msg" style="background:#000; border:1px solid #333; padding:20px; border-radius:15px; color:#fff;" placeholder="СООБЩЕНИЕ">
                    <button onclick="kernel.submitToGuestbook()" style="background:var(--accent-primary); border:none; padding:0 40px; border-radius:15px; font-weight:800;">EXECUTE</button>
                </div>
            </div>
        </section>

        <section id="archive" class="tab-content col-12">
            <h1 class="hero-text">PROJECT_<span>ARCHIVE</span></h1>
            <div id="archive-grid-render" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; margin-top: 40px;"></div>
        </section>

        <section id="secret" class="tab-content col-12">
            <div class="bento-node col-12" style="height: 600px; background: #000;">
                <span class="log-prefix">// RESTRICTED_SHELL</span>
                <div id="main-terminal-output" style="font-family: var(--font-mono); font-size: 14px; color: var(--accent-primary); padding: 20px;"></div>
            </div>
        </section>

        <section id="config" class="tab-content col-12">
            <div class="bento-node col-12">
                <span class="log-prefix">// THEME_ENGINE</span>
                <div class="theme-grid" id="theme-render"></div>
            </div>
        </section>
    </main>

    <div id="modal-portal" class="ferum-modal-overlay" onclick="if(event.target==this) kernel.closeModal()">
        <div class="modal-content-wrap">
            <div id="modal-render-area"></div>
        </div>
    </div>

    <script>
        class FerumKernel {
            constructor() {
                this.supabase = supabase.createClient('https://ibybgkugoumvjftgxxii.supabase.co', 'sb_publishable_B8DzBzbaTDAWG9fEfytZSA_Fp4Svs7F');
                this.state = { boot: Date.now(), activeTab: 'home', themes: [
                    {n:'Retro Blood', c:'#ff0055'}, {n:'Cyber Pulse', c:'#00f2ff'}, {n:'Toxic Void', c:'#bcff00'}, {n:'Ghost Shell', c:'#ffffff'},
                    {n:'Neon Dream', c:'#ff00ff'}, {n:'Gold Dust', c:'#ffd700'}, {n:'Deep Sea', c:'#0055ff'}, {n:'Forest', c:'#00ff66'},
                    {n:'Amber', c:'#ffaa00'}, {n:'Ultraviolet', c:'#9d00ff'}, {n:'Slime', c:'#32cd32'}, {n:'Crimson', c:'#dc143c'},
                    {n:'Ice', c:'#afeeee'}, {n:'Midnight', c:'#191970'}, {n:'Sakura', c:'#ffb7c5'}, {n:'Matrix', c:'#22ff00'},
                    {n:'Carbon', c:'#555555'}, {n:'Bumblebee', c:'#f3ce13'}, {n:'Vampire', c:'#8b0000'}, {n:'Nord', c:'#88c0d0'},
                    {n:'Solar', c:'#d08770'}, {n:'Coffee', c:'#6f4e37'}, {n:'Nebula', c:'#4b0082'}, {n:'Acid', c:'#dfff00'},
                    {n:'Void', c:'#222222'}, {n:'Mint', c:'#98ff98'}, {n:'Rose', c:'#e0115f'}, {n:'Sky', c:'#87ceeb'},
                    {n:'Lava', c:'#ff4500'}, {n:'Zenith', c:'#000080'}
                ]};
                this.audio = [new Audio('https://stream.zeno.fm/0r0xa792kwzuv'), new Audio('https://listen.moe/stream')];
                this.init();
            }

            init() {
                this.setupCursor();
                this.startClock();
                this.renderThemes();
                this.renderVisualizers();
                this.logToTerminal("Kernel check: OK. Systems nominal.");
            }

            setupCursor() {
                const dot = document.getElementById('cursor-main');
                const ring = document.getElementById('cursor-outline');
                window.addEventListener('mousemove', e => {
                    dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                    ring.style.left = (e.clientX - 20) + 'px'; ring.style.top = (e.clientY - 20) + 'px';
                });
            }

            startClock() {
                setInterval(() => {
                    const s = Math.floor((Date.now() - this.state.boot) / 1000);
                    document.getElementById('uptime-display').innerText = new Date(s * 1000).toISOString().substr(11, 8);
                }, 1000);
            }

            switchTab(tab, btn) {
                document.querySelectorAll('.tab-content').forEach(el => {
                    el.style.display = 'none';
                    el.classList.remove('active-tab');
                });
                const target = document.getElementById(tab);
                target.style.display = (tab === 'home' ? 'contents' : 'block');
                setTimeout(() => target.classList.add('active-tab'), 10);
                
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if(tab === 'archive') this.fetchArchive();
                if(tab === 'secret') this.runSecret();
            }

            async submitToGuestbook() {
                const name = document.getElementById('gb-user').value;
                const message = document.getElementById('gb-msg').value;
                if(!name || !message) return;
                const { error } = await this.supabase.from('guestbook').insert([{ name, message }]);
                if(!error) { this.logToTerminal("Uplink success."); document.getElementById('gb-msg').value = ''; }
            }

            async fetchArchive() {
                const { data } = await this.supabase.from('projects').select('*');
                const container = document.getElementById('archive-grid-render');
                container.innerHTML = data.map(item => `
                    <div class="bento-node" onclick="kernel.openModal('${item.name}', '${item.content || item.message}')">
                        <span class="log-prefix">NODE_0x${item.id.toString(16)}</span>
                        <h3>${item.name}</h3>
                        <p style="color:var(--text-muted); font-size:12px; margin-top:10px">${(item.content || '').substring(0, 50)}...</p>
                    </div>
                `).join('');
            }

            renderThemes() {
                const grid = document.getElementById('theme-render');
                this.state.themes.forEach(t => {
                    const card = document.createElement('button');
                    card.className = 'theme-card';
                    card.innerHTML = `<div style="width:20px; height:4px; background:${t.c}; margin-bottom:10px"></div>${t.n}`;
                    card.onclick = () => {
                        document.documentElement.style.setProperty('--accent-primary', t.c);
                        document.documentElement.style.setProperty('--accent-glow', t.c + '55');
                    };
                    grid.appendChild(card);
                });
            }

            toggleAudio(idx) {
                const strip = document.getElementById(`audio-${idx}`);
                if(this.audio[idx].paused) {
                    this.audio.forEach(a => a.pause());
                    this.audio[idx].play();
                    strip.classList.add('active-audio');
                } else {
                    this.audio[idx].pause();
                    strip.classList.remove('active-audio');
                }
            }

            renderVisualizers() {
                [0, 1].forEach(id => {
                    const viz = document.getElementById(`viz-${id}`);
                    for(let i=0; i<30; i++) {
                        const b = document.createElement('div');
                        b.style.opacity = 0.2 + (i/30);
                        viz.appendChild(b);
                    }
                });
            }

            openModal(title, text) {
                const portal = document.getElementById('modal-portal');
                document.getElementById('modal-render-area').innerHTML = `<h1 class="hero-text" style="font-size:3rem">${title}</h1><div style="font-family:var(--font-mono); margin-top:30px; line-height:1.6">${text}</div>`;
                portal.style.display = 'grid';
                setTimeout(() => portal.classList.add('active'), 10);
            }

            closeModal() { document.getElementById('modal-portal').classList.remove('active'); setTimeout(() => document.getElementById('modal-portal').style.display='none', 400); }

            logToTerminal(msg) {
                const line = `<div>[${new Date().toLocaleTimeString()}] > ${msg}</div>`;
                document.getElementById('mini-terminal').innerHTML += line;
            }

            runSecret() {
                const out = document.getElementById('main-terminal-output');
                out.innerHTML = '';
                ["Bypassing firewalls...", "Accessing root...", "Welcome, OPERATOR."].forEach((l, i) => {
                    setTimeout(() => out.innerHTML += `<div>> ${l}</div>`, i * 500);
                });
            }
        }
        const kernel = new FerumKernel();
    </script>
</body>
</html>
